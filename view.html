<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>CCTV · View</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; color: #e5e7eb; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
  #frame { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
  .hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 12px; right: 12px; display: flex; justify-content: space-between; gap: 8px; pointer-events: none; }
  .pill { pointer-events: auto; background: rgba(15,23,42,.75); backdrop-filter: blur(12px); border-radius: 999px; padding: 8px 14px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
  .dot.live { background: #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,.7); animation: pulse 1.6s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
  #start { position: fixed; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 30%, #1e293b, #020617); z-index: 10; }
  #start .box { text-align: center; padding: 40px 32px; }
  #start h1 { margin: 0 0 8px; font-weight: 600; font-size: 24px; }
  #start p { margin: 0 0 28px; color: #94a3b8; font-size: 14px; }
  #go { padding: 18px 40px; font-size: 17px; font-weight: 600; border: 0; border-radius: 14px; background: linear-gradient(135deg,#22c55e,#15803d); color: #fff; box-shadow: 0 10px 30px -10px rgba(34,197,94,.6); cursor: pointer; }
</style>
</head>
<body>
<div id="start"><div class="box">
  <h1>iPad CCTV</h1>
  <p>Tap to connect and watch the live feed.</p>
  <button id="go">▶  Connect</button>
</div></div>
<img id="frame" alt="" />
<div class="hud">
  <span class="pill"><span id="dot" class="dot"></span><span id="status">idle</span></span>
</div>

<script>
const statusEl = document.getElementById('status');
const dotEl = document.getElementById('dot');
const frame = document.getElementById('frame');
let prevUrl = null;

function setStatus(t, live) {
  statusEl.textContent = t;
  dotEl.classList.toggle('live', !!live);
}

function connect() {
  document.getElementById('start').remove();
  setStatus('connecting…');

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/stream`);
  ws.binaryType = 'blob';

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'viewer' }));
    setStatus('waiting for broadcaster…');
  };

  ws.onmessage = (e) => {
    if (e.data instanceof Blob) {
      const url = URL.createObjectURL(e.data);
      frame.src = url;
      if (prevUrl) URL.revokeObjectURL(prevUrl);
      prevUrl = url;
      setStatus('live', true);
    }
  };

  ws.onclose = () => { setStatus('disconnected'); dotEl.classList.remove('live'); };
  ws.onerror = () => setStatus('connection error');
}

document.getElementById('go').onclick = connect;
</script>
</body>
</html>
