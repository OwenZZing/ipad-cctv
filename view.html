<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>CCTV · View</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; color: #e5e7eb; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
  #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
  .hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 12px; right: 12px; display: flex; justify-content: space-between; gap: 8px; pointer-events: none; }
  .pill { pointer-events: auto; background: rgba(15,23,42,.75); backdrop-filter: blur(12px); border-radius: 999px; padding: 8px 14px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
  .dot.live { background: #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,.7); animation: pulse 1.6s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
  #start { position: fixed; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 30%, #1e293b, #020617); z-index: 10; }
  #start .box { text-align: center; padding: 40px 32px; }
  #start h1 { margin: 0 0 8px; font-weight: 600; font-size: 24px; }
  #start p { margin: 0 0 28px; color: #94a3b8; font-size: 14px; }
  #go { padding: 18px 40px; font-size: 17px; font-weight: 600; border: 0; border-radius: 14px; background: linear-gradient(135deg,#22c55e,#15803d); color: #fff; box-shadow: 0 10px 30px -10px rgba(34,197,94,.6); cursor: pointer; }
</style>
</head>
<body>
<div id="start"><div class="box">
  <h1>iPad CCTV</h1>
  <p id="roomLabel">room: —</p>
  <button id="go">▶  Connect</button>
</div></div>
<video id="video" autoplay playsinline muted></video>
<div class="hud">
  <span class="pill"><span id="dot" class="dot"></span><span id="status">idle</span></span>
  <span class="pill" id="room">room: —</span>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const ROOM_ID = new URLSearchParams(location.search).get('room') || 'cctv-room-1';
const statusEl = document.getElementById('status');
const dotEl = document.getElementById('dot');
const roomEl = document.getElementById('room');
const video = document.getElementById('video');
const startOverlay = document.getElementById('start');
roomEl.textContent = 'room: ' + ROOM_ID;
document.getElementById('roomLabel').textContent = 'room: ' + ROOM_ID;

function setStatus(t, live) {
  statusEl.textContent = t;
  dotEl.classList.toggle('live', !!live);
}

function connect() {
  startOverlay.remove();
  setStatus('connecting…');

  const peer = new Peer(undefined, {
    host: location.hostname,
    port: location.port || (location.protocol === 'https:' ? 443 : 80),
    path: '/peerjs',
    secure: location.protocol === 'https:',
    debug: 1,
  });

  peer.on('open', () => {
    setStatus('calling ' + ROOM_ID + '…');
    const conn = peer.connect(ROOM_ID, { reliable: true });
    conn.on('open', () => setStatus('connected, waiting for stream…'));
    conn.on('error', (e) => setStatus('conn error: ' + e));
    conn.on('close', () => setStatus('disconnected'));
  });

  peer.on('call', (call) => {
    call.answer();
    call.on('stream', (remote) => {
      video.srcObject = remote;
      setStatus('live · ' + ROOM_ID, true);
      video.onloadedmetadata = () => {
        video.play().catch(() => {
          // Chrome autoplay blocked — show tap-to-play overlay
          const overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;inset:0;display:grid;place-items:center;z-index:20;cursor:pointer;';
          overlay.innerHTML = '<div style="background:rgba(0,0,0,.7);color:#fff;padding:20px 36px;border-radius:14px;font-size:18px;font-weight:600;">▶  tap to play</div>';
          document.body.appendChild(overlay);
          overlay.addEventListener('click', () => { video.play(); overlay.remove(); }, { once: true });
        });
      };
    });
    call.on('close', () => setStatus('stream ended'));
    call.on('error', (e) => setStatus('call error: ' + e));
  });

  peer.on('error', (err) => {
    if (err.type === 'peer-unavailable') setStatus('room offline · no broadcaster');
    else setStatus('error: ' + err.type);
  });
  peer.on('disconnected', () => {
    setStatus('reconnecting…');
    peer.reconnect();
  });
}

document.getElementById('go').onclick = connect;
</script>
</body>
</html>
