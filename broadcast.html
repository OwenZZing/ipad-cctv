<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>CCTV · Broadcast</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; color: #e5e7eb; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
  #preview { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  canvas { display: none; }
  .hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 12px; right: 12px; display: flex; justify-content: space-between; gap: 8px; pointer-events: none; }
  .pill { pointer-events: auto; background: rgba(15,23,42,.75); backdrop-filter: blur(12px); border-radius: 999px; padding: 8px 14px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
  .dot.live { background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,.7); animation: pulse 1.6s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
  #start { position: fixed; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 30%, #1e293b, #020617); z-index: 10; }
  #start .box { text-align: center; padding: 40px 32px; }
  #start h1 { margin: 0 0 8px; font-weight: 600; font-size: 24px; }
  #start p { margin: 0 0 28px; color: #94a3b8; font-size: 14px; }
  #go { padding: 18px 40px; font-size: 17px; font-weight: 600; border: 0; border-radius: 14px; background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff; box-shadow: 0 10px 30px -10px rgba(239,68,68,.6); cursor: pointer; }
</style>
</head>
<body>
<div id="start"><div class="box">
  <h1>iPad CCTV</h1>
  <p>Tap to start streaming from this device.</p>
  <button id="go">● Start broadcasting</button>
</div></div>
<video id="preview" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
<div class="hud">
  <span class="pill"><span id="dot" class="dot"></span><span id="status">idle</span></span>
  <span class="pill" id="viewers">0 viewers</span>
</div>

<script>
const statusEl = document.getElementById('status');
const dotEl = document.getElementById('dot');
const viewersEl = document.getElementById('viewers');
const preview = document.getElementById('preview');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function setStatus(t, live) {
  statusEl.textContent = t;
  dotEl.classList.toggle('live', !!live);
}

async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          try { await navigator.wakeLock.request('screen'); } catch {}
        }
      });
    }
  } catch {}
}

async function start() {
  document.getElementById('start').remove();
  setStatus('requesting camera…');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
  } catch (e) {
    setStatus('camera denied: ' + e.message);
    return;
  }

  preview.srcObject = stream;
  keepAwake();

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  let ws, sendTimer;

  function connectWS() {
    ws = new WebSocket(`${proto}://${location.host}/stream`);
    ws.binaryType = 'blob';

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'broadcaster' }));
      setStatus('live · waiting for viewers', true);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'viewers') {
          viewersEl.textContent = msg.count + ' viewer' + (msg.count !== 1 ? 's' : '');
          setStatus('live · ' + msg.count + ' viewer' + (msg.count !== 1 ? 's' : ''), true);
        }
      } catch {}
    };

    ws.onclose = () => { setStatus('reconnecting…', false); setTimeout(connectWS, 2000); };
    ws.onerror = () => ws.close();
  }

  connectWS();

  const FPS = 10;
  setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const w = preview.videoWidth;
    const h = preview.videoHeight;
    if (!w || !h) return;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
    ctx.drawImage(preview, 0, 0, w, h);
    canvas.toBlob((blob) => {
      if (blob && ws.readyState === WebSocket.OPEN) ws.send(blob);
    }, 'image/jpeg', 0.7);
  }, 1000 / FPS);
}

document.getElementById('go').onclick = () => start().catch(e => setStatus('failed: ' + e.message));
</script>
</body>
</html>
